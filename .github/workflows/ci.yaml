name: Deploy Infrastructure

on:
  workflow_dispatch:
  repository_dispatch:
    types: [backend-deployed]

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: read

    steps:
      - name: Install WireGuard and SSH tools
        run: |
          sudo apt-get update
          sudo apt-get install -y wireguard resolvconf openssh-client sshpass

      - name: Configure VPN
        run: |
          sudo mkdir -p /etc/wireguard
          echo "${{ secrets.WG_CONFIG }}" | sudo tee /etc/wireguard/wg0.conf > /dev/null
          sudo chmod 600 /etc/wireguard/wg0.conf
          sudo wg-quick up wg0

      - name: Verify VPN connection
        run: |
          ping -c 3 192.168.100.206

      - name: Deploy on Proxmox
        run: |
          sshpass -p "${{ secrets.RW_AI_DEV_SERVER_PASSWORD }}" ssh -o StrictHostKeyChecking=no administrator@192.168.100.206 << 'EOF'
            cd /home/administrator/pdf-processor-infra
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u relewant-dev --password-stdin

            git fetch origin main
            git checkout main
            git pull origin main

            docker compose pull
            docker compose up -d

            echo "Deployment completed successfully"
          EOF