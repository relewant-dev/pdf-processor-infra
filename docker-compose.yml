services:
  backend:
    image: ghcr.io/relewant-dev/pdf-processor-services:latest
    container_name: pdf-processor-services
    env_file:
      - ./backend/.env
    environment:
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.1:8b}
      QDRANT_URL: http://qdrant:6333
      LOG_LEVEL: INFO
    depends_on:
      ollama:
        condition: service_healthy
      ollama-pull:
        condition: service_completed_successfully
      qdrant:
        condition: service_started
    ports:
      - "8000:8000"
    networks:
      - pdf-network
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ${QDRANT_STORAGE_DIR:-/home/administrator/data/qdrant/storage}:/qdrant/storage
    networks:
      - pdf-network
    restart: unless-stopped

  ollama:
    image: ollama/ollama:0.24.0
    container_name: ollama
    command: serve
    ports:
      - "11434:11434"
    volumes:
      - ${OLLAMA_DATA_DIR:-/home/administrator/data/ollama}:/root/.ollama
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
      OLLAMA_LLM_LIBRARY: cpu
      OLLAMA_VULKAN: "0"
      OLLAMA_FLASH_ATTENTION: "0"
      GGML_CPU_AMX: "0"
      GGML_CPU_AARCH64: "0"
      OLLAMA_DEBUG: "1"
    healthcheck:
      test: ["CMD", "ollama", "list"]
      start_period: 20s
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - pdf-network
    restart: unless-stopped

  ollama-pull:
    image: ollama/ollama:0.24.0
    container_name: ollama-model-pull
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.1:8b}
      OLLAMA_LLM_LIBRARY: cpu
      OLLAMA_VULKAN: "0"
      OLLAMA_FLASH_ATTENTION: "0"
      GGML_CPU_AMX: "0"
      GGML_CPU_AARCH64: "0"
    entrypoint: ["/bin/sh", "-lc"]
    command: |
      custom_bundle=/tmp/custom-ca-bundle.crt
      if find /custom-ca -type f \( -name '*.crt' -o -name '*.pem' \) | grep -q .; then
        if [ -f /etc/ssl/certs/ca-certificates.crt ]; then
          cat /etc/ssl/certs/ca-certificates.crt $(find /custom-ca -type f \( -name '*.crt' -o -name '*.pem' \) | sort) > "$${custom_bundle}"
        else
          cat $(find /custom-ca -type f \( -name '*.crt' -o -name '*.pem' \) | sort) > "$${custom_bundle}"
        fi
        export SSL_CERT_FILE="$${custom_bundle}"
      fi
      exec ollama pull "$${OLLAMA_MODEL}"
    volumes:
      - ${OLLAMA_DATA_DIR:-/home/administrator/data/ollama}:/root/.ollama
      - ${OLLAMA_CA_CERTS_DIR:-./certs/ollama}:/custom-ca:ro
    networks:
      - pdf-network
    restart: "no"

networks:
  pdf-network:
    driver: bridge