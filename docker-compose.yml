services:
  backend:
    image: ghcr.io/relewant-dev/pdf-processor-services:latest
    container_name: pdf-processor-services
    env_file:
      - ./backend/.env
    environment:
      OLLAMA_URL: ${OLLAMA_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.1:8b}
      QDRANT_URL: http://qdrant:6333
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - qdrant
    ports:
      - "8000:8000"
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - /home/alessandro/Desktop/data/qdrant:/qdrant/storage
    restart: unless-stopped