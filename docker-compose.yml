services:
  backend:
    image: ghcr.io/relewant-dev/pdf-processor-services:latest
    container_name: pdf-processor-services
    env_file:
      - ./backend/.env
    environment:
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: llama3.1:8b
      QDRANT_URL: http://qdrant:6333
      LOG_LEVEL: INFO
    depends_on:
      ollama:
        condition: service_healthy
      qdrant:
        condition: service_started
    ports:
      - "8000:8000"
    networks:
      - pdf-network
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - /home/administrator/data/qdrant/storage:/qdrant/storage
    networks:
      - pdf-network
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - /home/administrator/data/ollama:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - pdf-network
    restart: unless-stopped

networks:
  pdf-network:
    driver: bridge